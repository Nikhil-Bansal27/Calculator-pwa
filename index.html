<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#FFC107">
<meta name="description" content="NIKHIL Calculator - A beautiful, accessible PWA calculator with dark mode support">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NIKHIL Calc">
<link rel="manifest" href="manifest.json">
<title>NIKHIL Calculator</title>

<style>
body{
    margin:0;
    background:#FFD54F;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    transition:0.3s;
}

.calculator{
    width:340px;
    background:#FFF8E1;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    border:3px solid #FFC107;
    transition:0.3s;
}

.logo{
    text-align:center;
    color:#F57F17;
    font-size:40px;
    font-weight:bold;
}

.dev{
    text-align:center;
    color:#795548;
    margin-bottom:15px;
    font-weight:bold;
    font-size:20px;
}

#display{
    width:100%;
    height:70px;
    font-size:28px;
    text-align:right;
    border:2px solid #FFC107;
    border-radius:12px;
    margin-bottom:15px;
    padding-right:10px;
    background:white;
    box-sizing:border-box;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    font-size:22px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
}

.num{
    background:#FFECB3;
    color:#000;
}

.op{
    background:#FFC107;
    color:#000;
}

.equal{
    background:#FF9800;
    color:white;
}

.clear{
    background:#F44336;
    color:white;
}

.history{
    color:#5D4037;
    margin-top:15px;
    max-height:120px;
    overflow:auto;
    font-size:14px;
    background:#FFFDE7;
    padding:8px;
    border-radius:10px;
}

#themeBtn{
    width:100%;
    height:45px;
    margin-bottom:10px;
    border:none;
    border-radius:10px;
    background:#FFC107;
    color:#000;
    font-weight:bold;
    font-size:16px;
    cursor:pointer;
}

.dark{
    background:#121212 !important;
}

.dark .calculator{
    background:#1e1e1e !important;
    border:3px solid #444 !important;
}

.dark .logo{
    color:#FFC107 !important;
}

.dark .dev{
    color:white !important;
}

.dark #display{
    background:#222 !important;
    color:white !important;
    border:2px solid #555 !important;
}

.dark .num{
    background:#333 !important;
    color:white !important;
}

.dark .op{
    background:#555 !important;
    color:white !important;
}

.dark .equal{
    background:#00c853 !important;
    color:white !important;
}

.dark .clear{
    background:#e53935 !important;
    color:white !important;
}

.dark .history{
    background:#222 !important;
    color:white !important;
}

.dark #themeBtn{
    background:#444 !important;
    color:white !important;
}
</style>
</head>

<body>
<div class="calculator">
    <div class="logo">NC</div>
    <div class="dev">NIKHIL Calculator</div>

    <button id="themeBtn" onclick="toggleTheme()">🌙 Dark Theme</button>

    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="appendValue('%')">%</button>
        <button class="op" onclick="sqrtCalc()">√</button>
        <button class="op" onclick="appendValue('/')">÷</button>

        <button class="num" onclick="appendValue('7')">7</button>
        <button class="num" onclick="appendValue('8')">8</button>
        <button class="num" onclick="appendValue('9')">9</button>
        <button class="op" onclick="appendValue('*')">×</button>

        <button class="num" onclick="appendValue('4')">4</button>
        <button class="num" onclick="appendValue('5')">5</button>
        <button class="num" onclick="appendValue('6')">6</button>
        <button class="op" onclick="appendValue('-')">−</button>

        <button class="num" onclick="appendValue('1')">1</button>
        <button class="num" onclick="appendValue('2')">2</button>
        <button class="num" onclick="appendValue('3')">3</button>
        <button class="op" onclick="appendValue('+')">+</button>

        <button class="num" onclick="appendValue('0')">0</button>
        <button class="num" onclick="appendValue('.')">.</button>
        <button class="num" onclick="backspace()">⌫</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>

    <div class="history" id="history">
        <b>History:</b><br>
    </div>
</div>

<script>
// Register Service Worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('Service Worker registered'))
        .catch(err => console.log('Service Worker registration failed'));
}

function toggleTheme(){
    document.body.classList.toggle("dark");
    let btn = document.getElementById("themeBtn");
    let theme = document.body.classList.contains("dark") ? "dark" : "light";
    localStorage.setItem("theme", theme);
    
    if(document.body.classList.contains("dark")){
        btn.innerHTML = "☀️ Light Theme";
    } else {
        btn.innerHTML = "🌙 Dark Theme";
    }
}

function appendValue(value){
    document.getElementById("display").value += value;
}

function clearDisplay(){
    document.getElementById("display").value = "";
}

function backspace(){
    let display = document.getElementById("display");
    display.value = display.value.slice(0,-1);
}

function sqrtCalc(){
    let display = document.getElementById("display");
    try{
        display.value = Math.sqrt(eval(display.value));
    }catch{
        display.value = "Error";
    }
}

function calculate(){
    let display = document.getElementById("display");
    try{
        let expression = display.value;
        let result = eval(expression);
        document.getElementById("history").innerHTML += expression + " = " + result + "<br>";
        display.value = result;
    }catch{
        display.value = "Error";
    }
}

// Load theme preference on page load
window.addEventListener('load', function() {
    let savedTheme = localStorage.getItem("theme");
    if(savedTheme === "dark") {
        document.body.classList.add("dark");
        document.getElementById("themeBtn").innerHTML = "☀️ Light Theme";
    }
});
</script>
</body>
</html>
